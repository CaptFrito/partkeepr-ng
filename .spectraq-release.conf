# Per-project overrides for spectraq-release-driver.sh on chrisbuck.
#
# The gitolite repo is partkeepr-ng but the Gentoo package is
# partkeepr-api (matches the binary + the existing OpenRC service
# name).  Without this override the driver looks for
# ebuild/partkeepr-ng-0.1.0.ebuild and a tarball at
# /tmp/partkeepr-ng-0.1.0.tar.xz, neither of which we produce.

PACKAGE=partkeepr-api
